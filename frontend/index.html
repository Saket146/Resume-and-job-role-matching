<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeIQ – AI Resume Analyzer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060810;
      --surface: #0d1117;
      --surface2: #161b27;
      --border: rgba(255,255,255,0.07);
      --accent: #5B6EF5;
      --accent2: #7C3AED;
      --green: #22D3A5;
      --yellow: #F5C842;
      --red: #F55B5B;
      --text: #E8EAF2;
      --muted: #7B84A0;
      --glow: rgba(91,110,245,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* Ambient glow blobs */
    .blob1, .blob2 {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .blob1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(91,110,245,0.12) 0%, transparent 70%);
      top: -200px; left: -100px;
      animation: drift1 20s ease-in-out infinite alternate;
    }
    .blob2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.1) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: drift2 25s ease-in-out infinite alternate;
    }

    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px, 80px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-40px, -60px); } }

    #root { position: relative; z-index: 1; }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 48px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(6,8,16,0.7);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--accent); }
    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      background: rgba(91,110,245,0.15);
      color: var(--accent);
      border: 1px solid rgba(91,110,245,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 24px 48px;
      max-width: 700px;
      margin: 0 auto;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(91,110,245,0.1);
      border: 1px solid rgba(91,110,245,0.25);
      padding: 6px 16px;
      border-radius: 40px;
      margin-bottom: 28px;
    }
    .hero-tag::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
    }
    .hero h1 .gradient-text {
      background: linear-gradient(135deg, #5B6EF5, #22D3A5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.7;
      font-weight: 300;
    }

    /* UPLOAD PANEL */
    .upload-container {
      max-width: 900px;
      margin: 0 auto 60px;
      padding: 0 24px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 640px) {
      .upload-grid { grid-template-columns: 1fr; }
      .header { padding: 16px 20px; }
    }

    .upload-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .upload-card:hover { border-color: rgba(91,110,245,0.4); }
    .upload-card.drag-over {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--glow);
      background: rgba(91,110,245,0.05);
    }

    .upload-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upload-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .dropzone {
      border: 1.5px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .dropzone:hover { border-color: rgba(91,110,245,0.5); background: rgba(91,110,245,0.03); }
    .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone-icon { font-size: 28px; margin-bottom: 10px; }
    .dropzone-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .dropzone-text strong { color: var(--accent); }

    .file-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(34,211,165,0.08);
      border: 1px solid rgba(34,211,165,0.2);
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
    }
    .file-info-icon { color: var(--green); font-size: 16px; }
    .file-name { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { color: var(--muted); font-size: 12px; }
    .file-remove {
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
    }
    .file-remove:hover { color: var(--red); }

    /* Text area option */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    textarea.text-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 14px;
      resize: vertical;
      min-height: 100px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea.text-input:focus { border-color: rgba(91,110,245,0.5); }
    textarea.text-input::placeholder { color: var(--muted); }

    /* ANALYZE BUTTON */
    .analyze-btn {
      width: 100%;
      padding: 16px 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .analyze-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .analyze-btn:hover::before { opacity: 1; }
    .analyze-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(91,110,245,0.35); }
    .analyze-btn:active { transform: translateY(0); }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

    /* LOADING */
    .loading-state {
      text-align: center;
      padding: 60px 24px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(91,110,245,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-steps {
      list-style: none;
      display: inline-flex;
      flex-direction: column;
      gap: 8px;
      text-align: left;
    }
    .loading-steps li {
      font-size: 14px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .loading-steps li.active { color: var(--text); }
    .loading-steps li.done { color: var(--green); }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* RESULTS */
    .results-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: gap;
      gap: 16px;
    }
    .results-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
    }
    .reset-btn {
      padding: 10px 22px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* SCORE CARD */
    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 36px;
      flex-wrap: wrap;
    }

    .score-circle-wrap {
      position: relative;
      width: 160px;
      height: 160px;
      flex-shrink: 0;
    }
    .score-circle-svg {
      transform: rotate(-90deg);
    }
    .score-circle-bg {
      fill: none;
      stroke: rgba(255,255,255,0.05);
      stroke-width: 8;
    }
    .score-circle-fill {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .score-circle-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-number {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
    }
    .score-pct { font-size: 16px; font-weight: 600; color: var(--muted); }

    .score-info { flex: 1; min-width: 200px; }
    .score-verdict {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .score-desc { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }

    .score-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid;
    }
    .pill-green { background: rgba(34,211,165,0.1); color: var(--green); border-color: rgba(34,211,165,0.25); }
    .pill-blue { background: rgba(91,110,245,0.1); color: var(--accent); border-color: rgba(91,110,245,0.25); }
    .pill-yellow { background: rgba(245,200,66,0.1); color: var(--yellow); border-color: rgba(245,200,66,0.25); }

    /* GRID LAYOUT */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 720px) { .results-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* SECTION SCORES */
    .section-bar {
      margin-bottom: 16px;
    }
    .section-bar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .section-bar-name { font-size: 13px; font-weight: 500; text-transform: capitalize; }
    .section-bar-score { font-size: 12px; font-weight: 600; color: var(--muted); }
    .section-bar-track {
      height: 6px;
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
      overflow: hidden;
    }
    .section-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* KEYWORDS */
    .keyword-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .keyword-tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .keyword-match { background: rgba(34,211,165,0.1); color: var(--green); border: 1px solid rgba(34,211,165,0.2); }
    .keyword-missing { background: rgba(245,91,91,0.1); color: var(--red); border: 1px solid rgba(245,91,91,0.2); }

    /* COURSES */
    .courses-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
    }
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .course-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .course-card:hover {
      border-color: rgba(91,110,245,0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .course-provider {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .course-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 8px;
    }
    .course-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .course-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
    .badge-free { background: rgba(34,211,165,0.15); color: var(--green); }
    .badge-audit { background: rgba(245,200,66,0.15); color: var(--yellow); }
    .course-duration { font-size: 11px; color: var(--muted); }
    .course-reason { font-size: 11px; color: var(--muted); margin-top: 6px; font-style: italic; }
    .course-arrow { float: right; color: var(--accent); margin-top: 6px; }

    /* ERROR */
    .error-box {
      background: rgba(245,91,91,0.08);
      border: 1px solid rgba(245,91,91,0.25);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--red);
      font-size: 14px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 32px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }
    .footer a { color: var(--accent); text-decoration: none; }

    /* Fade in animation */
    .fade-in {
      animation: fadeIn 0.5s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const API_BASE = '/api';

    // ─── Utilities ────────────────────────────────────────────────
    function scoreColor(s) {
      if (s >= 75) return '#22D3A5';
      if (s >= 50) return '#5B6EF5';
      if (s >= 30) return '#F5C842';
      return '#F55B5B';
    }
    function scoreVerdict(s) {
      if (s >= 80) return { label: 'Excellent Match', desc: 'Your resume strongly aligns with this job. You\'re a top candidate — apply with confidence.' };
      if (s >= 65) return { label: 'Good Match', desc: 'Your resume aligns well with most requirements. A few targeted improvements could push you to the top.' };
      if (s >= 45) return { label: 'Moderate Match', desc: 'You meet several key requirements, but there are notable gaps. Consider upskilling in the missing areas.' };
      if (s >= 25) return { label: 'Weak Match', desc: 'Significant gaps exist between your profile and the job requirements. Focus on the recommended courses.' };
      return { label: 'Low Match', desc: 'This role may be a stretch right now. Building the missing skills will dramatically improve your chances.' };
    }
    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ─── CircularScore ────────────────────────────────────────────
    function CircularScore({ score, animate }) {
      const [displayed, setDisplayed] = useState(0);
      const radius = 68;
      const circ = 2 * Math.PI * radius;
      const fill = animate ? circ - (score / 100) * circ : circ;

      useEffect(() => {
        if (!animate) return;
        let start = null;
        const duration = 1400;
        const step = (ts) => {
          if (!start) start = ts;
          const p = Math.min((ts - start) / duration, 1);
          setDisplayed(Math.round(p * score));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [score, animate]);

      const color = scoreColor(score);
      return (
        <div className="score-circle-wrap">
          <svg className="score-circle-svg" width="160" height="160" viewBox="0 0 160 160">
            <circle className="score-circle-bg" cx="80" cy="80" r={radius} />
            <circle
              className="score-circle-fill"
              cx="80" cy="80" r={radius}
              stroke={color}
              strokeDasharray={circ}
              strokeDashoffset={fill}
            />
          </svg>
          <div className="score-circle-text">
            <span className="score-number" style={{ color }}>{animate ? displayed : score}</span>
            <span className="score-pct">/ 100</span>
          </div>
        </div>
      );
    }

    // ─── SectionBars ─────────────────────────────────────────────
    const SECTION_LABELS = {
      skills: '⚡ Technical Skills',
      experience: '💼 Work Experience',
      projects: '🛠 Projects',
      education: '🎓 Education',
      summary: '📝 Summary',
      achievements: '🏆 Achievements'
    };
    const SECTION_ORDER = ['skills', 'experience', 'projects', 'education', 'summary', 'achievements'];

    function SectionBars({ sectionScores }) {
      const [animated, setAnimated] = useState(false);
      useEffect(() => { setTimeout(() => setAnimated(true), 300); }, []);

      return (
        <div>
          {SECTION_ORDER.map(key => {
            const data = sectionScores[key];
            const score = data?.found ? data.score : 0;
            const color = scoreColor(score);
            return (
              <div className="section-bar" key={key}>
                <div className="section-bar-header">
                  <span className="section-bar-name">{SECTION_LABELS[key] || key}</span>
                  <span className="section-bar-score" style={{ color }}>
                    {data?.found ? score + '%' : 'Not Found'}
                  </span>
                </div>
                <div className="section-bar-track">
                  <div
                    className="section-bar-fill"
                    style={{
                      width: animated ? score + '%' : '0%',
                      background: `linear-gradient(90deg, ${color}aa, ${color})`
                    }}
                  />
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── DropZone ─────────────────────────────────────────────────
    function DropZone({ label, file, onFile, onRemove, accept }) {
      const [dragging, setDragging] = useState(false);
      const [text, setText] = useState('');
      const [mode, setMode] = useState('file'); // 'file' | 'text'

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setDragging(false);
        const f = e.dataTransfer.files[0];
        if (f) onFile(f, null);
      }, [onFile]);

      return (
        <div className={`upload-card ${dragging ? 'drag-over' : ''}`}>
          <div className="upload-label">
            <span className="dot" />
            {label}
          </div>
          <div
            className={`dropzone`}
            onDragOver={e => { e.preventDefault(); setDragging(true); }}
            onDragLeave={() => setDragging(false)}
            onDrop={handleDrop}
          >
            <input
              type="file"
              accept={accept}
              onChange={e => { if (e.target.files[0]) onFile(e.target.files[0], null); }}
            />
            <div className="dropzone-icon">📄</div>
            <div className="dropzone-text">
              <strong>Click or drag</strong> to upload<br />
              PDF, DOC, DOCX, TXT
            </div>
          </div>
          {file && (
            <div className="file-info">
              <span className="file-info-icon">✓</span>
              <span className="file-name">{file.name}</span>
              <span className="file-size">{formatBytes(file.size)}</span>
              <span className="file-remove" onClick={onRemove}>×</span>
            </div>
          )}
          {!file && (
            <>
              <div className="or-divider">or paste text</div>
              <textarea
                className="text-input"
                placeholder={`Paste ${label.toLowerCase()} text here...`}
                value={text}
                onChange={e => { setText(e.target.value); onFile(null, e.target.value); }}
              />
            </>
          )}
        </div>
      );
    }

    // ─── LoadingScreen ────────────────────────────────────────────
    function LoadingScreen() {
      const [step, setStep] = useState(0);
      const steps = [
        'Extracting text from documents',
        'Parsing resume sections',
        'Running NLP analysis',
        'Computing similarity scores',
        'Applying regression model',
        'Generating recommendations'
      ];
      useEffect(() => {
        const t = setInterval(() => setStep(s => Math.min(s + 1, steps.length - 1)), 200);
        return () => clearInterval(t);
      }, []);
      return (
        <div className="loading-state">
          <div className="spinner" />
          <p style={{ fontFamily: 'Syne', fontWeight: 700, marginBottom: 20, fontSize: 18 }}>Analyzing your resume</p>
          <ul className="loading-steps">
            {steps.map((s, i) => (
              <li key={i} className={i < step ? 'done' : i === step ? 'active' : ''}>
                <span className="step-dot" />
                {s}
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // ─── Results ──────────────────────────────────────────────────
    function Results({ data, onReset }) {
      const [animated, setAnimated] = useState(false);
      useEffect(() => { setTimeout(() => setAnimated(true), 100); }, []);

      const verdict = scoreVerdict(data.overallScore);
      const color = scoreColor(data.overallScore);

      return (
        <div className="results-container fade-in">
          <div className="results-header">
            <div className="results-title">Analysis Results</div>
            <button className="reset-btn" onClick={onReset}>← Analyze another</button>
          </div>

          {/* Main Score Card */}
          <div className="score-card">
            <CircularScore score={data.overallScore} animate={animated} />
            <div className="score-info">
              <div className="score-verdict" style={{ color }}>{verdict.label}</div>
              <div className="score-desc">{verdict.desc}</div>
              <div className="score-pills">
                <span className="pill pill-green">
                  {data.keywordAnalysis.matching.length} Keywords Matched
                </span>
                <span className="pill pill-blue">
                  {data.keywordAnalysis.matchPercentage}% Keyword Match
                </span>
                {data.resumeSections?.length > 0 && (
                  <span className="pill pill-yellow">
                    {data.resumeSections.length} Sections Found
                  </span>
                )}
              </div>
            </div>
          </div>

          {/* Section Scores + Keywords Grid */}
          <div className="results-grid">
            <div className="card">
              <div className="card-title">Section-wise Score</div>
              <SectionBars sectionScores={data.sectionScores} />
            </div>

            <div className="card">
              <div className="card-title">Keyword Analysis</div>
              {data.keywordAnalysis.matching.length > 0 && (
                <>
                  <p style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 10 }}>✓ Matching Keywords</p>
                  <div className="keyword-grid" style={{ marginBottom: 18 }}>
                    {data.keywordAnalysis.matching.slice(0, 18).map(k => (
                      <span key={k} className="keyword-tag keyword-match">{k}</span>
                    ))}
                  </div>
                </>
              )}
              {data.keywordAnalysis.missing.length > 0 && (
                <>
                  <p style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 10 }}>✗ Missing Keywords</p>
                  <div className="keyword-grid">
                    {data.keywordAnalysis.missing.slice(0, 18).map(k => (
                      <span key={k} className="keyword-tag keyword-missing">{k}</span>
                    ))}
                  </div>
                </>
              )}
              {data.keywordAnalysis.matching.length === 0 && data.keywordAnalysis.missing.length === 0 && (
                <p style={{ color: 'var(--muted)', fontSize: 13 }}>No technical keywords detected in the job description.</p>
              )}
            </div>
          </div>

          {/* Course Recommendations */}
          {data.recommendations && data.recommendations.length > 0 && (
            <div className="courses-section">
              <div className="card-title">Recommended Courses to Bridge the Gap</div>
              <p style={{ fontSize: 14, color: 'var(--muted)', marginTop: -8 }}>
                Free and open-source resources to strengthen your profile for this role.
              </p>
              <div className="courses-grid">
                {data.recommendations.map((course, i) => (
                  <a
                    key={i}
                    href={course.url}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="course-card"
                  >
                    <div className="course-provider">{course.provider}</div>
                    <div className="course-title">{course.title}</div>
                    <div className="course-meta">
                      <span className={`course-badge ${course.type === 'free' ? 'badge-free' : 'badge-audit'}`}>
                        {course.type === 'free' ? 'Free' : 'Free Audit'}
                      </span>
                      <span className="course-duration">⏱ {course.duration}</span>
                    </div>
                    {course.reason && (
                      <div className="course-reason">{course.reason}</div>
                    )}
                    <div className="course-arrow">→</div>
                  </a>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Main App ─────────────────────────────────────────────────
    function App() {
      const [resumeFile, setResumeFile] = useState(null);
      const [resumeText, setResumeText] = useState('');
      const [jdFile, setJdFile] = useState(null);
      const [jdText, setJdText] = useState('');
      const [loading, setLoading] = useState(false);
      const [results, setResults] = useState(null);
      const [error, setError] = useState('');

      const handleAnalyze = async () => {
        if (!resumeFile && !resumeText.trim()) {
          setError('Please upload or paste your resume.');
          return;
        }
        if (!jdFile && !jdText.trim()) {
          setError('Please upload or paste the job description.');
          return;
        }
        setError('');
        setLoading(true);

        try {
          const formData = new FormData();
          if (resumeFile) formData.append('resume', resumeFile);
          else formData.append('resumeText', resumeText);
          if (jdFile) formData.append('jobDescription', jdFile);
          else formData.append('jobDescText', jdText);

          const res = await fetch(`${API_BASE}/analyze`, {
            method: 'POST',
            body: formData
          });

          const json = await res.json();
          if (!res.ok || json.error) throw new Error(json.error || 'Analysis failed');
          setResults(json);
        } catch (err) {
          setError('Error: ' + err.message + '. Make sure the backend server is running on port 5000.');
        } finally {
          setLoading(false);
        }
      };

      const handleReset = () => {
        setResults(null);
        setResumeFile(null);
        setResumeText('');
        setJdFile(null);
        setJdText('');
        setError('');
      };

      return (
        <>
          <header className="header">
            <div className="logo">Resume<span>IQ</span></div>
            <span className="badge">NLP Powered</span>
          </header>

          {!results && !loading && (
            <>
              <div className="hero fade-in">
                <div className="hero-tag">AI Resume Analyzer</div>
                <h1>
                  Know your<br />
                  <span className="gradient-text">Match Score</span>
                </h1>
                <p>
                  Upload your resume and job description. Our NLP engine analyzes skill overlap,
                  experience alignment, and project relevance — giving you an accurate match score
                  and personalized learning recommendations.
                </p>
              </div>

              <div className="upload-container fade-in">
                {error && (
                  <div className="error-box">
                    <span>⚠</span> {error}
                  </div>
                )}
                <div className="upload-grid">
                  <DropZone
                    label="Your Resume"
                    file={resumeFile}
                    onFile={(f, t) => { setResumeFile(f); setResumeText(t || ''); }}
                    onRemove={() => setResumeFile(null)}
                    accept=".pdf,.doc,.docx,.txt"
                  />
                  <DropZone
                    label="Job Description"
                    file={jdFile}
                    onFile={(f, t) => { setJdFile(f); setJdText(t || ''); }}
                    onRemove={() => setJdFile(null)}
                    accept=".pdf,.doc,.docx,.txt"
                  />
                </div>
                <button className="analyze-btn" onClick={handleAnalyze}>
                  Analyze Resume Match →
                </button>
              </div>
            </>
          )}

          {loading && <LoadingScreen />}

          {results && !loading && (
            <Results data={results} onReset={handleReset} />
          )}

          <footer className="footer">
            ResumeIQ — Built with React, Node.js, NLP & free open-source resources &nbsp;·&nbsp;
            Courses sourced from <a href="https://freecodecamp.org" target="_blank">freeCodeCamp</a>,{' '}
            <a href="https://coursera.org" target="_blank">Coursera</a>,{' '}
            <a href="https://ocw.mit.edu" target="_blank">MIT OCW</a>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
